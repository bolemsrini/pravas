<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pravas Consultants | Best Overseas Education Consultancy in Hyderabad</title>
  <style>
    /* Reset & CSS Variables */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #5c328e; /* Purple outer background */
      color: #333333;
      display: flex;
      justify-content: center;
      min-height: 100vh;
    }

    /* 1. Centered Main Page Container */
    .page-wrapper {
      width: 100%;
      max-width: 1200px;
      background-color: #ffffff;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }

    /* 2. Navigation Header Alignment */
    .site-header {
      padding: 1.25rem 2rem;
      border-bottom: 1px solid #eef0f2;
    }

    .navbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
    }

    .logo img {
      height: 48px;
      display: block;
    }

    .nav-links {
      display: flex;
      align-items: center;
      list-style: none;
      gap: 1.75rem;
    }

    .nav-links a {
      text-decoration: none;
      color: #555555;
      font-weight: 500;
      font-size: 0.95rem;
      transition: color 0.2s ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: #5c328e;
    }

    /* Single-line vertically aligned CTA button */
    .cta-button {
      background-color: #ff5722;
      color: #ffffff;
      padding: 0.65rem 1.25rem;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      white-space: nowrap;
      transition: background-color 0.2s ease;
    }

    .cta-button:hover {
      background-color: #e64a19;
    }

    /* 3. Hero Section Centering */
    .hero-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 4rem 2rem 3rem;
      max-width: 800px;
      margin: 0 auto;
    }

    .hero-image-wrapper {
      width: 280px;
      height: 280px;
      border-radius: 50%;
      overflow: hidden;
      margin-bottom: 2rem;
      border: 4px solid #ffffff;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
    }

    .hero-image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-title {
      font-size: 2.5rem;
      line-height: 1.25;
      color: #222222;
      margin-bottom: 1rem;
      font-weight: 700;
    }

    .hero-subtitle {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #666666;
    }

    /* Mobile Responsiveness */
    @media (max-width: 768px) {
      .navbar {
        flex-direction: column;
        align-items: stretch;
      }

      .nav-links {
        flex-wrap: wrap;
        justify-content: center;
      }

      .hero-title {
        font-size: 1.85rem;
      }
    }
  </style>
</head>
<body>

  <div class="page-wrapper">
    <!-- Header / Navigation -->
    <header class="site-header">
      <nav class="navbar">
        <a href="index.html" class="logo">
          <img src="logo.png" alt="Pravas Consultants Logo" />
        </a>

        <ul class="nav-links">
          <li><a href="index.html" class="active">Home</a></li>
          <li><a href="#destinations">Destinations</a></li>
          <li><a href="services.html">Services</a></li>
          <li><a href="about-us.html">About Us</a></li>
          <li><a href="#contact">Contact</a></li>
        </ul>

        <a href="#consultation" class="cta-button">Book Free Consultation</a>
      </nav>
    </header>

    <!-- Main Content / Hero -->
    <main>
      <section class="hero-section">
        <div class="hero-image-wrapper">
          <img src="library.jpg" alt="Library of Columbia University" />
        </div>
        <h1 class="hero-title">Your Global Education Journey Starts Here</h1>
        <p class="hero-subtitle">
          We guide ambitious students from India to world-class universities in the USA, Canada, Australia, UK, New Zealand, and Europe — with expert support at every step.
        </p>
      </section>
    </main>
  </div>

</body>
</html>
