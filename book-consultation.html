<!DOCTYPE html>
<html lang="en">
<head>
    <title>Book a Free Consultation - Pravas Consultants Hyderabad</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta name="description" content="Book a free 30-minute study abroad consultation with Pravas Consultants in KPHB, Hyderabad. Get an honest profile assessment and expert university recommendations." />
    <meta name="keywords" content="book free consultation, study abroad counseling Hyderabad, overseas education assessment KPHB" />
    <meta name="referrer" content="same-origin" />
    <link rel="icon" href="/favicon.ico" />
    
    <!-- Project Stylesheets -->
    <link rel="stylesheet" href="assets/css/main.css" />
    <noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
    
    <!-- URL Parameter Cleanup Script -->
    <script>
        (function () {
            try {
                var url = new URL(location.href);
                if (url.searchParams.has('sessionToken')) {
                    url.searchParams.delete('sessionToken');
                    history.replaceState(null, '', url.toString());
                }
            } catch (error) {
                console.error("URL manipulation failed:", error);
            }
        })();
    </script>
    
    <!-- Application Specific Utilities -->
    <script src="/utils-theme-detector.js"></script>
    <script src="/utils-device-layout.js"></script>
    <!-- Custom Page Styling -->
    <style>
        /* Modern Reset & Font */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }

        /* Form Container */
        .form-container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            box-sizing: border-box;
            margin: 40px auto; /* Centers the form block horizontally */
        }

        .form-container h2 {
            margin-top: 0;
            margin-bottom: 8px;
            color: #000000; /* Changed to Black */
            font-size: 24px;
        }

        .form-container p {
            color: #000000; /* Changed to Black */
            font-size: 14px;
            margin-bottom: 24px;
        }

        /* Form Fields & Structural Wrappers */
        .form-group, .field {
            margin-bottom: 20px;
        }

        /* Container for Side-by-Side elements */
        .fields {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .field.half {
            flex: 1;
        }

        .form-group label, .field label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #000000; /* Changed to Black */
            font-size: 14px;
        }

        /* Styling for ALL input elements: text, tel, select dropdowns, and textareas */
        .form-group input, 
        .field select, 
        .field textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cccccc;
            border-radius: 6px;
            color: #000000; /* Ensures typed text is Black */
            font-size: 15px;
            box-sizing: border-box;
            font-family: inherit; /* Ensures uniform font styling */
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* Standardized height and appearance adjustment for selects */
        .field select {
            height: 46px; 
            background-color: #ffffff;
        }

        /* Prevent textareas from being sized completely out of shape */
        .field textarea {
            resize: vertical;
        }

        /* Focus states for accessibility across all inputs */
        .form-group input:focus,
        .field select:focus,
        .field textarea:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15);
        }

        /* Submit Button */
        .submit-btn {
            width: 100%;
            padding: 10px;
            background-color: #007bff;
            border: none;
            border-radius: 6px;
            color: white; /* Kept white for contrast against the blue button */
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .submit-btn:hover {
            background-color: #0056d3;
        }
    </style>
</head>
<body class="app-container-view">

    <!-- 1. Global Application Navigation -->
    <nav class="app-navigation">
        <a href="/index.html">Home</a>
        <a href="/about-us.html">About Us</a>
        <a href="/services.html">Services</a>
        <a href="/book-consultation.html" class="active" aria-current="page">Book a Consultation</a>
    </nav>

   <!-- 2. Client Inquiry Form -->
    <div class="form-container">
        <h2>Let's Connect</h2>
        <p>Please fill out the form below, and we will get back to you shortly.</p>
        
        <!-- Updated Action URL to connect to Formspree -->
        <form id="client-info-form" action="https://formspree.io/f/mlgqdgll" method="POST">
            
            <!-- Name Field -->
            <div class="form-group">
                <label for="client-name">Full Name *</label>
                <input type="text" id="client-name" name="name" placeholder="e.g., Vanitha Srinivas" style="color: #000000;" required>
            </div>

            <!-- Email Field -->
            <div class="form-group">
                <label for="client-email">Email Address *</label>
                <input type="email" id="client-email" name="email" placeholder="e.g., vanitha.bs@example.com" style="color: #000000;" required>
            </div>

            <!-- Phone Field (Fixed validation pattern) -->
            <div class="form-group">
                <label for="client-phone">Phone Number *</label>
                <input type="tel" id="client-phone" name="phone" placeholder="e.g., +1 (555) 000-0000" pattern="[0-9\-\+\s()]+" title="Please enter a valid phone number containing only digits, spaces, dashes, or parentheses." required>
            </div>
<!-- Row: Preferred Destination & Course Level (Side-by-Side) -->
<div class="fields">
    <div class="field half">
        <label for="destination">Preferred Destination</label>
        <select name="destination" id="destination" required>
            <option value="" disabled selected>Select Country</option>
            <option value="USA">United States (USA)</option>
            <option value="UK">United Kingdom (UK)</option>
            <option value="Canada">Canada</option>
            <option value="Australia">Australia</option>
            <option value="Europe">Europe / Germany</option>
            <option value="Other">Other</option>
        </select>
    </div>
    <div class="field half">
        <label for="degree">Interested In</label>
        <select name="degree" id="degree" required>
            <option value="">Select Degree Level</option>
            <option value="Bachelors">Bachelor's Degree</option>
            <option value="Masters">Master's / PG Degree</option>
            <option value="MBA">MBA</option>
            <option value="PhD">Ph.D. / Doctorate</option>
        </select>
    </div>
</div>

<!-- Row: Target Intake Year -->
<div class="field">
    <label for="intake">Target Intake Year</label>
    <select name="intake" id="intake" required>
        <option value="">Select Intake & Year</option>
        <option value="Fall 2026">Fall 2026</option>
        <option value="Spring 2027">Spring 2027</option>
        <option value="Fall 2027">Fall 2027</option>
        <option value="Later">Later</option>
    </select>
</div>

<!-- Row: Goals (Textarea) -->
<div class="field">
    <label for="goals">Tell me your goals *</label>
    <textarea name="goals" id="goals" rows="4" placeholder="Briefly describe your career goals, specific universities in mind, or any questions you have..." style="color: #000000;" required></textarea>
</div>











            
            <!-- Submit Button -->
            <button type="submit" class="submit-btn">Submit Information</button>
        </form>
    </div>

    
    <!-- 3. Module Scripts & Analytics -->
    <script type="module" src="/src/main.js"></script>
    <script src="/telemetry.js"></script>

</body>
</html>
